<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1200px; height: 630px; overflow: hidden; }
  </style>
</head>
<body>
  <div style="width:1200px;height:630px;background:#C41E3A;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:80px 90px;box-sizing:border-box;position:relative;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

    <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;">
      <div style="width:64px;height:64px;background:#FFD700;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="14" stroke="#C41E3A" stroke-width="2.5"/>
          <path d="M10 22 Q14 12 18 18 Q22 24 26 14" stroke="#C41E3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="12" cy="20" r="2" fill="#C41E3A"/>
          <circle cx="18" cy="16" r="2" fill="#C41E3A"/>
          <circle cx="24" cy="22" r="2" fill="#C41E3A"/>
        </svg>
      </div>
      <div style="width:3px;height:56px;background:rgba(255,255,255,0.3);border-radius:2px;"></div>
      <span style="color:rgba(255,255,255,0.7);font-size:18px;letter-spacing:3px;text-transform:uppercase;font-weight:500;">318 Wards · GCC · Avadi · Tambaram</span>
    </div>

    <div style="font-size:100px;font-weight:800;color:#FFFFFF;line-height:1;margin-bottom:20px;letter-spacing:-2px;">Namma Kuppai</div>

    <div style="font-size:28px;font-weight:500;color:rgba(255,255,255,0.92);margin-bottom:30px;line-height:1.3;max-width:720px;">
      Chennai's Civic Issue Reporting & Accountability Platform
    </div>

    <div style="width:60px;height:3px;background:#FFD700;border-radius:2px;margin-bottom:28px;"></div>

    <div style="font-size:26px;color:#FFD700;font-weight:500;font-style:italic;">
      "For the Singara Chennai we grew up loving 💛"
    </div>

    <div style="position:absolute;bottom:50px;right:90px;text-align:right;">
      <div style="font-size:22px;color:rgba(255,255,255,0.95);font-weight:600;letter-spacing:1px;">nammakuppai.in</div>
    </div>

    <div style="position:absolute;bottom:50px;left:90px;">
      <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:8px 18px;display:flex;align-items:center;gap:8px;">
        <div style="width:8px;height:8px;background:#4ade80;border-radius:50%;"></div>
        <span style="color:white;font-size:14px;">Anonymous Reporting</span>
      </div>
    </div>

  </div>
</body>
</html>
